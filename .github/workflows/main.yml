name: production-ready-ci

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run lint
        run: flake8 .

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flask-app:latest .

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-app:latest

      - name: Run container
        run: docker run -d -p 5000:5000 --name mycontainer flask-app:latest

      - name: Wait for startup
        run: sleep 10

      - name: Show ALL containers
        run: docker ps -a

      - name: Inspect container
        run: docker inspect mycontainer

      - name: Show logs
        run: docker logs mycontainer

      - name: Test health endpoint
        run: curl -v http://localhost:5000/health
